name: GazeTerminal
options:
  bundleIdPrefix: com.gazeterminal
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

targets:
  GazeTerminal:
    type: application
    platform: macOS
    sources:
      - Sources/GazeTerminal
    resources:
      - path: Resources/gaze_tracker.py
        buildPhase: resources
      - path: Resources/test_gaze.py
        buildPhase: resources
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: GazeTerminal.entitlements
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gazeterminal.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: eyeTerm
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WhisperKit
        product: WhisperKit
