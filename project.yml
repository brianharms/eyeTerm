name: eyeTerm
options:
  bundleIdPrefix: com.eyeterm
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper.git
    branch: master

targets:
  eyeTerm:
    type: application
    platform: macOS
    sources:
      - Sources/EyeTerm
    postCompileScripts:
      - script: |
          cp "${PROJECT_DIR}/Resources/eye_tracker.py" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/eye_tracker.py"
          cp "${PROJECT_DIR}/Resources/test_eye.py" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/test_eye.py"
          # Copy bundled whisper.cpp ggml models
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/Models/ggml"
          cp -n "${PROJECT_DIR}/Resources/Models/ggml/"*.bin "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/Models/ggml/" 2>/dev/null || true
          # Copy bundled WhisperKit CoreML models
          if [ -d "${PROJECT_DIR}/Resources/Models/whisperkit" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/Models/whisperkit"
            cp -Rn "${PROJECT_DIR}/Resources/Models/whisperkit/" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/Models/whisperkit/" 2>/dev/null || true
          fi
        name: Copy Resources
    preBuildScripts:
      - script: |
          # Strip extended attributes from source resources to prevent codesign failures
          xattr -cr "${PROJECT_DIR}/Resources" 2>/dev/null || true
          find "${PROJECT_DIR}/Resources" -name "._*" -delete 2>/dev/null || true
          find "${PROJECT_DIR}/Resources" -name ".DS_Store" -delete 2>/dev/null || true
        name: Clean Resource Attributes
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: EyeTerm.entitlements
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eyeterm.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: eyeTerm
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: SwiftWhisper
        product: SwiftWhisper
